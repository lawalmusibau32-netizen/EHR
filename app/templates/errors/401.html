{% extends "base.html" %}

{% block title %}Unauthorized | HealthIQ{% endblock %}
{% block page_title %}Unauthorized{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-7 col-xl-6">
    <div class="card panel-card">
      <div class="card-body p-4 p-lg-5 text-center">
        <div class="eyebrow mb-2">401</div>
        <h1 class="h3 mb-3">Authentication required</h1>
        <p class="text-muted mb-4">
          Please sign in with a valid account to continue.
        </p>
        <a class="btn btn-primary" href="{{ url_for('auth.login') }}">Go to login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
